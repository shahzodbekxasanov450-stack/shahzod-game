<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SHAHZOD DRIFT</title>
    <style>
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; font-family: sans-serif; }
        #game { width: 400px; height: 500px; border: 5px solid #ff0; background: #222; position: relative; overflow: hidden; }
        #score { position: absolute; top: 10px; left: 10px; font-size: 20px; color: #ff0; z-index: 10; }
        #player { position: absolute; bottom: 80px; left: 175px; font-size: 50px; z-index: 5; }
        #enemy { position: absolute; top: -100px; left: 175px; font-size: 50px; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; background: #ff0; border: none; font-weight: bold; cursor: pointer; z-index: 100; font-size: 20px; }
        .line { position: absolute; width: 10px; height: 100px; background: #fff; left: 195px; animation: move 0.3s linear infinite; }
        @keyframes move { from { top: -100px; } to { top: 500px; } }
    </style>
</head>
<body>
    <div id="game">
        <div id="score">Ball: 0</div>
        <div class="line" style="top:0"></div>
        <div class="line" style="top:200px"></div>
        <div class="line" style="top:400px"></div>
        <div id="player">🏎️</div>
        <div id="enemy">🚓</div>
        <button id="startBtn" onclick="gameStart()">START</button>
    </div>
    <script>
        let px = 175, ey = -100, ex = 175, sc = 0, live = false;
        const p = document.getElementById('player'), e = document.getElementById('enemy'), s = document.getElementById('score'), b = document.getElementById('startBtn');
        function gameStart() { live = true; b.style.display = 'none'; loop(); }
        document.onkeydown = (ev) => {
            if (ev.key === 'ArrowLeft' && px > 0) px -= 40;
            if (ev.key === 'ArrowRight' && px < 350) px += 40;
            p.style.left = px + 'px';
        };
        function loop() {
            if (!live) return;
            ey += 8;
            if (ey > 500) { ey = -100; ex = Math.random() * 320; sc += 10; s.innerText = "Ball: " + sc; }
            e.style.top = ey + 'px'; e.style.left = ex + 'px';
            let r1 = p.getBoundingClientRect(), r2 = e.getBoundingClientRect();
            if (!(r1.right < r2.left  r1.left > r2.right  r1.bottom < r2.top || r1.top > r2.bottom)) {
                alert("AVARIYA! Ballingiz: " + sc); location.reload();
            }
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
