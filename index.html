<!DOCTYPE html><html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shahzod Xasanov Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;color:white;touch-action:none;}
.game{position:relative;width:100%;max-width:400px;height:600px;background:#222;border:4px solid #444;overflow:hidden}
.road{position:absolute;width:100%;height:100%;background:linear-gradient(#333 50%,#383838 50%);background-size:100% 80px;animation:move 0.15s linear infinite}
@keyframes move{from{background-position-y:0}to{background-position-y:80px}}
.car,.enemy{position:absolute;width:50px;height:80px;font-size:45px;display:flex;flex-direction:column;align-items:center;}
.car{bottom:20px;left:150px;filter:drop-shadow(0 0 15px cyan);}
.enemy{top:-100px}
.car-name{font-size:10px;background:rgba(0,0,0,0.7);padding:2px 5px;border-radius:3px;margin-top:-5px}
.ui{position:absolute;top:10px;width:100%;display:flex;flex-direction:column;align-items:center;z-index:10;font-weight:bold;color:yellow;gap:5px}
.title{font-size:20px}
.vip{filter:drop-shadow(0 0 25px gold);}
</style>
</head>
<body>
<div class="game" id="game">
<div class="road"></div>
<div class="ui">
<div class="title">Shahzod Xasanov Game</div>
<div>Pul: <span id="money">0</span> 💰</div>
</div>
<div class="car vip" id="player">🚘<div class="car-name">NEXIA 3</div></div>
<div class="enemy" id="enemy1"></div>
<div class="enemy" id="enemy2"></div>
</div>
<script>
const game=document.getElementById('game');
const player=document.getElementById('player');
const enemy1=document.getElementById('enemy1');
const enemy2=document.getElementById('enemy2');
const moneyEl=document.getElementById('money');let posX=150; let speed=20; // birdan tez yuradi let money=0; let started=false; let e1Y=-100,e2Y=-300; let e1X=40,e2X=260;

const cars=[{i:'🚗',n:'Malibu'},{i:'🚘',n:'NEXIA 3'}];

player.style.left=posX+'px';

function randomCar(enemy){ let car=cars[Math.floor(Math.random()*cars.length)]; enemy.innerHTML=car.i+<div class="car-name">${car.n}</div>; }

function loop(){ if(!started) return; e1Y+=speed; e2Y+=speed+2;

if(e1Y>600){ e1Y=-100; e1X=[40,150,260][Math.floor(Math.random()*3)]; randomCar(enemy1); money++; }

if(e2Y>600){ e2Y=-200; e2X=[40,150,260][Math.floor(Math.random()*3)]; randomCar(enemy2); }

enemy1.style.top=e1Y+'px'; enemy1.style.left=e1X+'px'; enemy2.style.top=e2Y+'px'; enemy2.style.left=e2X+'px';

moneyEl.innerText=money; requestAnimationFrame(loop); }

// 🔥 START tugmasi ham, ekran bosilishi ham ishlaydi function startGame(){ if(started) return; started=true; randomCar(enemy1); randomCar(enemy2); loop(); }

// START tugmasi yaratamiz const startBtn = document.createElement('button'); startBtn.innerText = 'START'; startBtn.style.position='absolute'; startBtn.style.top='50%'; startBtn.style.left='50%'; startBtn.style.transform='translate(-50%,-50%)'; startBtn.style.padding='15px 30px'; startBtn.style.background='lime'; startBtn.style.border='none'; startBtn.style.borderRadius='10px'; startBtn.style.fontWeight='bold'; startBtn.style.zIndex='20'; game.appendChild(startBtn);

startBtn.addEventListener('click',()=>{ startBtn.style.display='none'; startGame(); });

// Ekran bosilsa ham boshlanadi (faqat hali boshlanmagan bo‘lsa) game.addEventListener('click',()=>{ if(!started){ startBtn.style.display='none'; startGame(); } });

game.addEventListener('touchstart',()=>{ if(!started){ startBtn.style.display='none'; startGame(); } });

// Sensor bilan boshqarish let touchX=null; document.addEventListener('touchstart',e=>{ touchX=e.touches[0].clientX; });

document.addEventListener('touchmove',e=>{ if(!started) return; let dx=e.touches[0].clientX-touchX; posX+=dx; if(posX<20)posX=20; if(posX>280)posX=280; player.style.left=posX+'px'; touchX=e.touches[0].clientX; }); </script>

</body>
</html>
