<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAHZOD GENTRA DRIFT</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        #gameArea { width: 320px; height: 480px; background: #333; border: 4px solid #ff0; position: relative; overflow: hidden; }
        #player { width: 50px; height: 80px; background: #f00; position: absolute; bottom: 10px; left: 135px; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 40px; }
        #enemy { width: 50px; height: 80px; background: #00f; position: absolute; top: -100px; left: 135px; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-size: 40px; }
        #score { position: absolute; top: 10px; left: 10px; font-size: 20px; color: #ff0; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; font-size: 20px; background: #ff0; border: none; cursor: pointer; color: #000; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="score">Ball: 0</div>
        <div id="player">🏎️</div>
        <div id="enemy">🚓</div>
        <button id="startBtn">START GAME</button>
    </div>

    <script>
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        let score = 0;
        let playerX = 135;
        let enemyY = -100;
        let enemyX = 135;
        let isGameRunning = false;

        startBtn.addEventListener('click', () => {
            isGameRunning = true;
            startBtn.style.display = 'none';
            gameLoop();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && playerX > 0) playerX -= 20;
            if (e.key === 'ArrowRight' && playerX < 270) playerX += 20;
            player.style.left = playerX + 'px';
        });

        function gameLoop() {
            if (!isGameRunning) return;
            enemyY += 5;
            if (enemyY > 480) {
                enemyY = -100;
                enemyX = Math.floor(Math.random() * 270);
                score += 10;
                scoreDisplay.innerText = "Ball: " + score;
            }
            enemy.style.top = enemyY + 'px';
            enemy.style.left = enemyX + 'px';

            let pRect = player.getBoundingClientRect();
            let eRect = enemy.getBoundingClientRect();

            if (!(pRect.right < eRect.left  pRect.left > eRect.right  pRect.bottom < eRect.top || pRect.top > eRect.bottom)) {
                alert("O'yin tugadi! Ballingiz: " + score);
                location.reload();
            }
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
